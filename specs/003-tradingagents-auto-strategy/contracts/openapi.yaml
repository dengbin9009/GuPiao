openapi: 3.1.0
info:
  title: GuPiao TradingAgents API
  version: 0.1.0
  description: TradingAgents 全自动模拟组合策略的管理员接口。所有接口都需要管理员会话。
paths:
  /api/trading-agents/readiness:
    get:
      summary: 查询密钥、依赖、干跑和自动调度就绪状态
      responses:
        '200': {description: 就绪状态}
  /api/trading-agents/profiles:
    get:
      summary: 查询分析档位和仓位映射
      responses:
        '200': {description: 可选配置}
  /api/trading-agents/config:
    put:
      summary: 更新独立策略配置和模拟账户绑定
      responses:
        '200': {description: 已保存配置}
        '422': {description: 参数或账户无效}
  /api/trading-agents/batches:
    get:
      summary: 查询批次列表
      responses:
        '200': {description: 批次列表}
    post:
      summary: 创建当日分析批次
      responses:
        '202': {description: 批次已创建或返回幂等批次}
        '503': {description: 密钥或固定依赖未就绪}
  /api/trading-agents/batches/{id}:
    get:
      summary: 查询候选分析、组合决策和订单详情
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        '200': {description: 批次详情}
        '404': {description: 批次不存在}
  /api/trading-agents/batches/{id}/cancel:
    post:
      summary: 取消未调仓批次
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        '200': {description: 已取消}
        '409': {description: 当前状态不能取消}
  /api/trading-agents/batches/{id}/dry-run:
    post:
      summary: 对 ready 批次执行一次完整无下单演练
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        '200': {description: 演练运行结果}
        '409': {description: 批次或配置不允许演练}
  /api/simulation/accounts:
    get:
      summary: 查询全部模拟账户
      responses:
        '200': {description: 账户列表}
    post:
      summary: 创建模拟账户
      responses:
        '201': {description: 已创建账户}
  /api/simulation/accounts/{id}:
    get:
      summary: 查询模拟账户
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        '200': {description: 账户详情}
