6. 人工门：没有自动 deploy、push、merge、发布或实盘动作。
7. 预算：不超过 6 次迭代；同一错误第 3 次失败即 ESCALATE_HUMAN。

仅输出 APPROVE、REJECT 或 ESCALATE_HUMAN，并附不含敏感信息的证据。缺少任一证据即 REJECT；触发安全门或熔断即 ESCALATE_HUMAN。
"""
reasoning_effort = "high"
